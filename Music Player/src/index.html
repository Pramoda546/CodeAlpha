<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

</head>

<body>

<div class="speaker left"></div>
<div class="speaker right"></div>

<div class="player">

<div class="track-art"><i class="fas fa-compact-disc"></i></div>
<div class="track-name">Add songs to play</div>
<div class="track-artist">Advanced Player</div>

<div class="controls">

<i class="fa fa-backward-step fa-2x" onclick="prevTrack()"></i>

<i class="fa fa-circle-play play-btn" id="playBtn" onclick="playPause()"></i>

<i class="fa fa-forward-step fa-2x" onclick="nextTrack()"></i>

<div class="liked">
<i class="fa-regular fa-heart fa-2x" id="likeBtn" onclick="toggleLike()"></i>
</div>

<i class="fa fa-list fa-2x" onclick="togglePlaylist()"></i>

</div>

<div class="slider_container">

<span id="current">0:00</span>

<input type="range" id="seek">

<span id="duration">0:00</span>

</div>

<div class="volume">

<i class="fa fa-volume-down"></i>

<input type="range" id="volume" min="0" max="100" value="50">

<i class="fa fa-volume-up"></i>

</div>

<div class="add-btns">

<label class="add-btn">
<i class="fa fa-music"></i> Add Song
<input type="file" id="fileInput" multiple accept="audio/*" hidden>
</label>

<label class="add-btn">
<i class="fa fa-image"></i> Add Album Art
<input type="file" id="imageInput" accept="image/*" hidden>
</label>

<select id="trackSelect" class="add-btn">
<option value="">Select Track</option>
</select>

</div>

</div>

<div class="playlist" id="playlist">
<h2>Playlist</h2>
<ul id="trackList" class="track-list"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
